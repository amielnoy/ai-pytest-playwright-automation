networks:
  default:
    name: db_automationtest25_4_2025_default

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: automation
      POSTGRES_USER: automation
      POSTGRES_PASSWORD: automation
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automation -d automation"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - automation-db-data:/var/lib/postgresql/data

  automation-server:
    build: .
    image: ai-automation-testing:latest
    command: ["uvicorn", "server.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      CI: "true"
      DATABASE_URL: postgresql://automation:automation@db:5432/automation
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docker-artifacts:/app/test-artifacts

  automation-tests:
    build: .
    image: ai-automation-testing:latest
    environment:
      CI: "true"
      PW_RECORD_ARTIFACTS: "true"
      DATABASE_URL: postgresql://automation:automation@db:5432/automation
      AUTOMATION_SERVER_URL: http://automation-server:8000
    depends_on:
      db:
        condition: service_healthy
      automation-server:
        condition: service_started
    volumes:
      - ./docker-artifacts:/app/test-artifacts
      - ./data:/app/data:ro
    command: ["pytest", "tests/", "--alluredir=/app/test-artifacts/allure-results"]
    profiles:
      - test

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://automation:automation@db:5432/automation?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy

  pushgateway:
    image: prom/pushgateway:v1.9.0
    ports:
      - "9091:9091"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - postgres-exporter
      - automation-server
      - pushgateway

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    ports:
      - "8090:8080"
    environment:
      SWAGGER_JSON: /spec/openapi.yaml
      PORT: 8080
    volumes:
      - ./docs:/spec:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8082:8080"
    volumes:
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    command:
      - --housekeeping_interval=10s
      - --docker_only=true
      - --disable_metrics=disk,diskIO,tcp,udp,percpu,sched,process

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.disable-defaults
      - --collector.cpu
      - --collector.meminfo
      - --collector.netdev
      - --collector.diskstats
      - --collector.filesystem

volumes:
  automation-db-data:
  prometheus-data:
  grafana-data:
