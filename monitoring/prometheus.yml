global:
  scrape_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: automation-server
    static_configs:
      - targets:
          - automation-server:8000

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets:
          - pushgateway:9091
