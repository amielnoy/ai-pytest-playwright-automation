# Playwright Python Tests -> Allure 3 Report -> GitHub Pages
#
# Setup (one-time):
#   1. Repo -> Settings -> Actions -> General -> Workflow permissions -> Read and write
#   2. Repo -> Settings -> Secrets -> Actions -> New secret:
#        Name:  TEST_SECRETS_JSON
#        Value: paste the full contents of data/secrets.json (never commit that file)
#   GitHub masks TEST_SECRETS_JSON in logs; the write step does not echo the JSON body.
#
# The report job also enforces GitHub Pages source to gh-pages/root automatically.

name: Playwright Tests

on:
  push:
    branches: [main, feature]
  pull_request:
    branches: [main, feature]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # --- Job 1: run tests ---
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write secrets.json from GitHub Secret
        env:
          TEST_SECRETS_JSON: ${{ secrets.TEST_SECRETS_JSON }}
        run: |
          set +x
          if [ -n "${TEST_SECRETS_JSON}" ]; then
            printf '%s' "${TEST_SECRETS_JSON}" > data/secrets.json
            chmod 600 data/secrets.json
            echo "secrets.json written (contents not logged)."
          else
            echo "No secrets provided — skipping secrets.json creation."
          fi

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system dependencies (cached hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run tests
        run: pytest tests/ -m "not demo" -n auto --dist loadgroup
        env:
          CI: "true"

      - name: Post test status to job summary
        if: always()
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          ARCH_URL="${PAGES_URL}/architecture.html"
          REPO_URL="https://github.com/${{ github.repository }}"
          RUN_URL="${REPO_URL}/actions/runs/${{ github.run_id }}"
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          RUN_NUM="${{ github.run_number }}"

          PASSED=0; FAILED=0; BROKEN=0; SKIPPED=0; TOTAL=0
          if [ -d allure-results ]; then
            read -r PASSED FAILED BROKEN SKIPPED TOTAL << EOF
          $(python3 << 'PY'
          import json
          from collections import defaultdict
          from pathlib import Path

          by_history: dict[str, list[dict]] = defaultdict(list)
          for path in Path("allure-results").glob("*-result.json"):
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
                  hid = data.get("historyId") or path.name
                  by_history[hid].append(data)
              except Exception:
                  pass

          counts = {"passed": 0, "failed": 0, "broken": 0, "skipped": 0}
          for entries in by_history.values():
              latest = max(entries, key=lambda item: item.get("stop", 0))
              status = latest.get("status", "unknown")
              if status in counts:
                  counts[status] += 1

          total = sum(counts.values())
          print(counts["passed"], counts["failed"], counts["broken"], counts["skipped"], total)
          PY
          )
          EOF
          fi

          if [ "$FAILED" -gt 0 ] || [ "$BROKEN" -gt 0 ]; then
            BADGE="🔴 FAILED"
          else
            BADGE="🟢 PASSED"
          fi

          {
            echo "## 🧪 Test Run \#${RUN_NUM} — ${BADGE}"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| ✅ Passed  | ${PASSED} |"
            echo "| ❌ Failed  | ${FAILED} |"
            echo "| ⚠️  Broken  | ${BROKEN} |"
            echo "| ⏭️  Skipped | ${SKIPPED} |"
            echo "| 📊 Total   | ${TOTAL} |"
            echo ""
            echo "## 🔗 Links"
            echo ""
            echo "| Resource | Link |"
            echo "|----------|------|"
            echo "| 📈 Allure Report | [Open report](${PAGES_URL}) |"
            echo "| 🏗️ Architecture | [architecture.html](${ARCH_URL}) |"
            echo "| 🌿 Branch | \`${BRANCH}\` |"
            echo "| 🔖 Commit | [\`${COMMIT_SHORT}\`](${REPO_URL}/commit/${{ github.sha }}) |"
            echo "| 🔄 Run | [#${RUN_NUM}](${RUN_URL}) |"
            echo ""
            echo "> [!NOTE]"
            echo "> Allure report publishes after the **report** job — refresh in ~30s if not live yet."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

  # --- Job 2: generate Allure 3 report and publish to GitHub Pages ---
  report:
    name: Allure 3 Report -> GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    if: always()
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Allure results from test job
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Restore Allure history (trend charts)
        uses: actions/cache@v4
        with:
          path: allure-history
          key: allure-history-${{ github.run_id }}
          restore-keys: |
            allure-history-

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Allure 3 CLI
        run: npm ci

      - name: Generate Allure 3 report
        run: npx allure generate allure-results

      - name: Copy architecture.html into report
        run: cp architecture.html allure-report/architecture.html

      - name: Copy AI Testing Academy into the report (served at /academy/)
        run: |
          mkdir -p allure-report/academy/assets allure-report/academy/videos
          cp ai-testing-academy/*.html allure-report/academy/
          cp -r ai-testing-academy/assets/. allure-report/academy/assets/
          cp ai-testing-academy/videos/*.mp4 ai-testing-academy/videos/*.html allure-report/academy/videos/ 2>/dev/null || true
          # /academy/ serves the English page directly as index.html (Hebrew is one click away)
          cp allure-report/academy/ai-testing-academy.html allure-report/academy/index.html

      - name: Post report link to job summary
        if: always()
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          REPO_URL="https://github.com/${{ github.repository }}"
          RUN_URL="${REPO_URL}/actions/runs/${{ github.run_id }}"
          COMMIT_SHORT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHORT:0:7}"
          BRANCH="${{ github.ref_name }}"
          RUN_NUM="${{ github.run_number }}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Test Report

          | | |
          |---|---|
          | **Allure Report** | [Open report]($PAGES_URL) |
          | **AI Testing Academy** | [Open academy]($PAGES_URL/academy/) |
          | **GitHub Pages URL** | https://amielnoy.github.io/AI_AUTOMATION_TESTING/ |
          | **Architecture docs** | [architecture.html](https://amielnoy.github.io/AI_AUTOMATION_TESTING/architecture.html) |
          | **Branch** | \`$BRANCH\` |
          | **Commit** | [\`$COMMIT_SHORT\`](${REPO_URL}/commit/${{ github.sha }}) |
          | **Run** | [#${RUN_NUM}]($RUN_URL) |

          > [!NOTE]
          > The report may take a minute to appear after the first deploy while GitHub Pages activates.
          EOF

      - name: Slim the published site (drop heavy CI videos/traces)
        run: |
          BEFORE=$(du -sm allure-report | cut -f1)
          # Playwright records a video (.webm) + trace (.zip) per web-ui test in CI and
          # Allure bundles them into the report, bloating the Pages artifact to ~100MB+
          # (a likely cause of the "Deployment failed, try again later" sync error).
          # A public report doesn't need them — pass/fail, logs and failure screenshots
          # remain, and the raw allure-results artifact still carries them for debugging.
          # (Academy explainer clips are .mp4 under academy/, so they are untouched.)
          find allure-report -type f \( -name '*.webm' -o -name '*.zip' \) -delete 2>/dev/null || true
          AFTER=$(du -sm allure-report | cut -f1)
          echo "Trimmed published report: ${BEFORE}MB -> ${AFTER}MB"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  # --- Job 3: deploy the report to GitHub Pages (official artifact flow) ---
  deploy:
    name: Deploy to GitHub Pages
    needs: report
    runs-on: ubuntu-latest
    # Dedicated Pages concurrency so deployments serialize instead of cancelling
    # each other mid-sync (the cause of "Deployment failed, try again later").
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
