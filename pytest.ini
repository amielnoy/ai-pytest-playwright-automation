[pytest]
addopts =
    --alluredir=allure-results
    --clean-alluredir
    --strict-config
    --strict-markers
    -v
    -n auto
    --dist loadscope
testpaths = tests
markers =
    registration: Registration tests
    search: Search with price filter tests
    cart: Cart tests
    api: API behavior tests
    contract: API contract and structure tests
