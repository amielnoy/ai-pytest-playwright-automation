[pytest]
addopts =
    --alluredir=allure-results
    --clean-alluredir
    --strict-config
    --strict-markers
    -v
    -n auto
    --dist loadgroup
testpaths = tests
markers =
    registration: Registration tests
    search: Search with price filter tests
    cart: Cart tests
    sanity: Sanity smoke tests for critical UI availability
    accessibility: Accessibility sanity checks
    api: API behavior tests
    contract: API contract and structure tests
    security: Security-focused API and unit tests
    pentest: Penetration testing probes against the live site
    xdist_group(name): Run marked tests in the same xdist worker group
