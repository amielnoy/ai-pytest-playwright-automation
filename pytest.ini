[pytest]
addopts =
    --alluredir=allure-results
    --clean-alluredir
    --reruns=1
    --strict-config
    --strict-markers
    -v
    -n auto
    --dist loadgroup
testpaths = tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_file = logs/automation.log
log_file_level = DEBUG
log_file_format = %(asctime)s | %(levelname)-8s | %(name)s | %(processName)s | %(message)s
markers =
    registration: Registration tests
    search: Search with price filter tests
    cart: Cart tests
    sanity: Sanity smoke tests for critical UI availability
    accessibility: Accessibility sanity checks
    api: API behavior tests
    contract: API contract and structure tests
    security: Security-focused API and unit tests
    pentest: Penetration testing probes against the live site
    ai: AI chat endpoint tests (requires ANTHROPIC_API_KEY and local server)
    dlp: Data Loss Prevention tests — verify sensitive data is not echoed by AI
    demo: Teaching/demo tests (intentional failure, flaky widget) — excluded from CI
    xdist_group(name): Run marked tests in the same xdist worker group
