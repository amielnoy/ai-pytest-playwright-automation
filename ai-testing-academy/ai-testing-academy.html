<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Testing Academy — Learn Test Automation, DevOps & AI Testing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* light warm palette — red/orange accents, high contrast */
    --bg:#fbf7f2; --bg2:#f8efe6; --card:#ffffff; --border:#e9dccf;
    --text:#2e2933; --muted:#5a5460; --accent:#c0392b; --accent2:#e07b28;
    --green:#3e8e57; --yellow:#b07c1f; --red:#c0392b;
    --code-bg:#332f3f;
    --field-bg:#ffffff;
    --track:#f1e4d6;
    --shadow:0 2px 10px rgba(120,80,50,.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:"Segoe UI","Heebo",Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.7;}
  a{color:var(--accent); text-decoration:none;}

  /* NAV — vertical sidebar docked to the left (LTR) */
  nav{position:fixed; top:0; inset-inline-start:0; bottom:0; width:280px; z-index:50;
      background:rgba(250,248,245,.97); backdrop-filter:blur(8px);
      border-right:1px solid var(--border); display:flex; flex-direction:column;
      gap:6px; align-items:stretch; padding:22px 14px; overflow-y:auto;}
  nav .logo{font-weight:800; font-size:1rem; white-space:nowrap; background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; background-clip:text; color:transparent;}
  nav a.link{color:var(--muted); font-size:.95rem; font-weight:700; padding:10px 14px; border-radius:10px; display:block;}
  nav a.link:hover{color:var(--text); background:var(--card); box-shadow:var(--shadow);}
  nav a.link.active{color:var(--accent); background:var(--card); font-weight:700;
      box-shadow:var(--shadow); border-inline-start:3px solid var(--accent);}
  nav .nav-group{font-size:1.1rem; letter-spacing:.03em; text-transform:uppercase; color:var(--text);
      opacity:.85; font-weight:800; padding:16px 14px 5px;}
  nav .nav-group:first-of-type{padding-top:2px;}
  body{padding-inline-start:280px;} /* reserve space for the fixed left sidebar (main's margin:0 auto can't cancel padding) */
  section{scroll-margin-top:20px;}
  /* mobile nav is handled by the off-canvas drawer in the enhancement layer below */

  /* HERO */
  header{padding:72px 24px 56px; text-align:center;
      background:radial-gradient(ellipse at top, #f8e2cf 0%, var(--bg) 70%);}
  header h1{font-size:2.4rem; line-height:1.25; margin-bottom:14px;}
  header h1 span{background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; background-clip:text; color:transparent;}
  header p{color:var(--muted); max-width:760px; margin:0 auto 26px; font-size:1.05rem;}
  .badges{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  .badge{border:1px solid var(--border); background:var(--card); color:var(--muted);
      padding:6px 14px; border-radius:999px; font-size:.82rem;}

  /* LAYOUT */
  main{max-width:1000px; margin:0 auto; padding:0 24px 80px;}
  section{padding:56px 0 8px; border-bottom:1px solid var(--border);}
  section:last-of-type{border-bottom:none;}
  h2{font-size:1.6rem; margin-bottom:8px;}
  h2 .num{color:var(--accent2); font-family:monospace; margin-right:8px;}
  .lead{color:var(--muted); margin-bottom:24px;}
  h3{font-size:1.08rem; margin:22px 0 8px; color:var(--accent);}
  p{margin-bottom:12px;}
  ul{margin:0 0 16px 0; padding-left:22px;}
  li{margin-bottom:6px;}

  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; margin:18px 0;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; box-shadow:var(--shadow);}
  .card h4{margin-bottom:8px; font-size:1rem;}
  .card p{color:var(--muted); font-size:.9rem; margin:0;}
  .tag{display:inline-block; font-size:.72rem; font-family:monospace; background:var(--code-bg);
      border:1px solid var(--border); border-radius:6px; padding:1px 8px; margin-right:6px; color:var(--yellow);}

  pre{direction:ltr; text-align:left; background:var(--code-bg); border:1px solid var(--border);
      border-radius:10px; padding:16px; overflow-x:auto; font-size:.83rem; line-height:1.55;
      font-family:"JetBrains Mono",Consolas,monospace; margin:12px 0 20px;}
  code.inline{background:var(--code-bg); border:1px solid var(--border);
      border-radius:6px; padding:1px 6px; font-size:.85em; font-family:Consolas,monospace; color:#ffd28e;}
  .comment{color:#6a737d;} .kw{color:#ff7b72;} .str{color:#a5d6ff;} .fn{color:#d2a8ff;}

  table{width:100%; border-collapse:collapse; margin:14px 0 22px; font-size:.9rem;}
  th,td{border:1px solid var(--border); padding:9px 12px; text-align:left;}
  th{background:var(--card); color:var(--accent);}
  td{color:var(--muted);}

  /* AGENTS */
  .agent-box{background:linear-gradient(160deg,#fdf4ea,#faeadb); border:1px solid #ecd6bd;
      border-radius:16px; padding:24px; margin:22px 0; box-shadow:var(--shadow);}
  .agent-box h3{margin-top:0; font-size:1.2rem; color:var(--text);}
  .agent-box .sub{color:var(--muted); font-size:.9rem; margin-bottom:16px;}
  textarea,input[type=password],input[type=text],select{
      width:100%; background:var(--field-bg); color:var(--text); border:1px solid var(--border);
      border-radius:10px; padding:12px; font-size:.92rem; font-family:inherit; resize:vertical;}
  textarea:focus,input:focus,select:focus{outline:none; border-color:var(--accent);}
  label{display:block; font-size:.85rem; color:var(--muted); margin:12px 0 6px;}
  button.primary{background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#fff; border:none;
      border-radius:10px; padding:11px 26px; font-size:.95rem; font-weight:700; cursor:pointer; margin-top:14px;}
  button.primary:disabled{opacity:.45; cursor:not-allowed;}
  button.ghost{background:transparent; color:var(--muted); border:1px solid var(--border);
      border-radius:10px; padding:10px 18px; cursor:pointer; margin-top:14px; margin-left:8px;}
  .keybar{display:grid; grid-template-columns:170px 1fr 220px; gap:12px; align-items:end;}
  @media(max-width:640px){.keybar{grid-template-columns:1fr;}}
  .notice{font-size:.8rem; color:var(--muted); margin-top:8px;}
  .error{color:var(--red); font-size:.88rem; margin-top:10px; white-space:pre-wrap;}
  .spinner{display:inline-block; width:16px; height:16px; border:2px solid var(--muted);
      border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* resume result */
  .score-wrap{display:flex; align-items:center; gap:18px; margin:16px 0;}
  .score-circle{width:92px; height:92px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:1.6rem; font-weight:800; border:5px solid var(--accent); flex-shrink:0;}
  .bar-row{margin:10px 0;}
  .bar-row .bar-label{display:flex; justify-content:space-between; font-size:.85rem; color:var(--muted); margin-bottom:4px;}
  .bar{height:9px; background:var(--track); border-radius:6px; overflow:hidden;}
  .bar>div{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:6px; transition:width .8s;}
  .result-cols{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px;}
  @media(max-width:640px){.result-cols{grid-template-columns:1fr;}}
  .result-cols .card ul{padding-left:18px; margin:0;}
  .result-cols .card li{font-size:.88rem; color:var(--muted);}

  /* chat */
  .chat{background:var(--bg2); border:1px solid var(--border); border-radius:12px;
      height:380px; overflow-y:auto; padding:16px; margin:14px 0; display:flex; flex-direction:column; gap:12px;}
  .msg{max-width:85%; padding:10px 14px; border-radius:12px; font-size:.92rem; white-space:pre-wrap;}
  .msg.ai{background:var(--card); border:1px solid var(--border); align-self:flex-start;}
  .msg.user{background:#fbe1cd; color:#5f3a1c; align-self:flex-end;}
  .msg.sys{background:transparent; color:var(--muted); font-size:.8rem; align-self:center;}
  .chat-input{display:flex; gap:10px;}
  .chat-input textarea{height:56px;}
  .chat-input button{margin-top:0;}

  footer{text-align:center; color:var(--muted); font-size:.82rem; padding:30px; border-top:1px solid var(--border);}

  /* videos & jobs */
  .video-card video{width:100%; border-radius:10px; margin-top:10px; background:#000;}
  .video-card .no-video{margin-top:10px; padding:22px 12px; border:2px dashed var(--border);
      border-radius:10px; text-align:center; color:var(--muted); font-size:.82rem;}
  a.job-card{display:block; color:inherit; transition:transform .15s, box-shadow .15s;}
  a.job-card:hover{transform:translateY(-3px); box-shadow:0 6px 18px rgba(120,80,50,.15);}
  a.job-card h4{color:var(--accent);}

  /* github */
  nav a.github-btn{background:#24292f; color:#fff !important; font-weight:700; text-align:center;}
  nav a.github-btn:hover{background:#000; box-shadow:0 4px 14px rgba(36,41,47,.35);}

  /* telegram */
  nav a.telegram-btn{background:linear-gradient(90deg,#0d76b5,#095e93); color:#fff !important;
      font-weight:700; text-align:center;}
  nav a.telegram-btn:hover{opacity:.9; box-shadow:0 4px 14px rgba(13,118,181,.35);}
  .telegram-banner{display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;
      background:linear-gradient(90deg,#0d76b5,#095e93); color:#fff; border-radius:12px;
      padding:14px 20px; margin:26px auto 0; max-width:560px; font-weight:700;}
  .telegram-banner:hover{opacity:.93;}

  /* upload */
  .upload-zone{border:2px dashed var(--border); border-radius:12px; padding:20px; text-align:center;
      color:var(--muted); font-size:.9rem; cursor:pointer; transition:border-color .2s, background .2s;}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--accent); background:rgba(224,123,40,.08); color:var(--text);}

  /* ===== polish layer ===== */
  body{font-family:"Heebo","Segoe UI",Arial,sans-serif;}
  ::selection{background:rgba(224,123,40,.25);}
  html{scrollbar-width:thin; scrollbar-color:#d9c6b0 transparent;}
  ::-webkit-scrollbar{width:10px;} ::-webkit-scrollbar-thumb{background:#d9c6b0; border-radius:8px;}

  h2{display:flex; align-items:center; gap:14px; padding-bottom:14px; position:relative;}
  h2::after{content:""; position:absolute; bottom:0; inset-inline-start:0; width:72px; height:4px;
      border-radius:4px; background:linear-gradient(90deg,var(--accent),var(--accent2));}
  h2 .num{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
      border-radius:10px; padding:2px 12px; font-size:1.05rem; margin:0;}

  .card,.agent-box,pre,button.primary,button.ghost,.badge,nav a.link{transition:all .22s ease;}
  .card:hover{transform:translateY(-3px); box-shadow:0 10px 24px rgba(120,80,50,.14);}
  .badge{background:var(--card); box-shadow:var(--shadow);}
  .badge:hover{border-color:var(--accent2); color:var(--text); transform:translateY(-2px);}
  pre{box-shadow:var(--shadow); border:none; border-top:3px solid var(--accent2);}
  button.primary:hover:not(:disabled){filter:brightness(1.08); box-shadow:0 6px 18px rgba(192,57,43,.30); transform:translateY(-1px);}
  button.ghost:hover{border-color:var(--accent2); color:var(--text);}
  .agent-box:focus-within{border-color:var(--accent2); box-shadow:0 6px 22px rgba(224,123,40,.16);}
  table{box-shadow:var(--shadow); border-radius:12px; overflow:hidden; border-collapse:separate; border-spacing:0;}
  tr:nth-child(even) td{background:rgba(224,123,40,.04);}

  /* scroll-reveal */
  section>*{opacity:1;}
  .reveal{opacity:0; transform:translateY(26px); transition:opacity .6s ease, transform .6s ease;}
  .reveal.in{opacity:1; transform:none;}
  @media (prefers-reduced-motion: reduce){.reveal{opacity:1; transform:none; transition:none;}}

  /* ═══════════ UI/UX enhancement layer ═══════════ */
  /* dark theme */
  html[data-theme="dark"]{
    --bg:#17151c; --bg2:#1e1b25; --card:#242029; --border:#37313f;
    --text:#ece8f0; --muted:#a99fb4; --accent:#ff6f57; --accent2:#f5a35a;
    --green:#5cc07e; --yellow:#e0b455; --red:#ff6f57;
    --code-bg:#100e17; --field-bg:#1b1823; --track:#2a2532;
    --shadow:0 2px 14px rgba(0,0,0,.4);
  }
  html[data-theme="dark"] body{background:var(--bg); color:var(--text);}
  html[data-theme="dark"] nav{background:rgba(23,21,28,.96);}
  html[data-theme="dark"] header{background:radial-gradient(ellipse at top,#2a2130 0%,var(--bg) 70%);}
  html[data-theme="dark"] .badge,html[data-theme="dark"] pre{background:var(--code-bg);}

  /* scroll-progress bar */
  .scroll-progress{position:fixed; top:0; inset-inline-start:0; height:3px; width:0; z-index:200;
      background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .08s linear;}

  /* floating action buttons (back-to-top, mobile menu) */
  .fab{position:fixed; z-index:120; width:44px; height:44px; border-radius:50%; border:1px solid var(--border);
      background:var(--card); color:var(--text); box-shadow:var(--shadow); cursor:pointer; font-size:1.15rem;
      display:flex; align-items:center; justify-content:center; transition:opacity .25s, transform .2s, border-color .2s;}
  .fab:hover{border-color:var(--accent2); transform:translateY(-2px);}
  .to-top{bottom:20px; inset-inline-end:20px; opacity:0; pointer-events:none;}
  .to-top.show{opacity:1; pointer-events:auto;}
  .nav-toggle{display:none;}

  /* theme toggle in the sidebar */
  nav .theme-toggle{margin-top:8px; display:flex; align-items:center; justify-content:center; gap:8px;
      border:1px solid var(--border); background:var(--card); color:var(--muted); border-radius:10px;
      padding:9px; cursor:pointer; font:inherit; font-size:.9rem; font-weight:700;}
  nav .theme-toggle:hover{color:var(--text); border-color:var(--accent2);}

  /* section-number chip in nav links */
  nav a.link .nav-num{display:inline-block; min-width:1.6em; font-family:monospace; font-size:.72rem;
      color:var(--muted); opacity:.65; margin-inline-end:6px;}
  .card p + p{margin-top:10px; line-height:1.85;}

  /* copy-to-clipboard button on code blocks */
  .pre-wrap{position:relative;}
  .pre-wrap .copy-btn{position:absolute; top:10px; inset-inline-end:10px; font:inherit; font-size:.72rem;
      cursor:pointer; background:rgba(255,255,255,.08); color:#ffd28e; border:1px solid rgba(255,255,255,.18);
      border-radius:6px; padding:3px 9px; opacity:0; transition:opacity .18s;}
  .pre-wrap:hover .copy-btn,.pre-wrap .copy-btn:focus{opacity:1;}
  .pre-wrap .copy-btn.copied{color:var(--green); border-color:var(--green);}

  /* collapsible agent-box (accordion) */
  details.agent-box>summary{cursor:pointer; list-style:none; display:flex; align-items:center; gap:10px; margin:0;}
  details.agent-box>summary::-webkit-details-marker{display:none;}
  details.agent-box>summary h3{margin:0;}
  details.agent-box>summary::after{content:"▾"; margin-inline-start:auto; color:var(--muted); transition:transform .2s;}
  details.agent-box[open]>summary::after{transform:rotate(180deg);}
  details.agent-box[open]>summary{margin-bottom:16px;}

  /* hero call-to-action + TL;DR */
  .hero-cta{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:24px 0 4px;}
  .hero-cta a{border-radius:10px; padding:11px 22px; font-weight:700; font-size:.95rem;
      border:1px solid var(--border); transition:transform .18s, box-shadow .18s, filter .18s;}
  .hero-cta a.primary{background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#fff; border:none;}
  .hero-cta a.ghost{background:var(--card); color:var(--text);}
  .hero-cta a:hover{transform:translateY(-2px); box-shadow:var(--shadow);}
  .tldr{max-width:660px; margin:24px auto 0; text-align:start; background:var(--card);
      border:1px solid var(--border); border-radius:12px; padding:16px 22px; box-shadow:var(--shadow);}
  .tldr b{color:var(--accent);}
  .tldr ul{margin:8px 0 0; padding-inline-start:20px;}
  .tldr li{color:var(--muted); font-size:.9rem; margin-bottom:4px;}

  /* mobile: off-canvas nav drawer + tighter spacing */
  @media(max-width:900px){
    .nav-toggle{display:flex; position:fixed; top:12px; inset-inline-start:12px; z-index:210;}
    nav{position:fixed; top:0; bottom:0; inset-inline-start:0; width:min(82vw,300px); flex-direction:column;
        transform:translateX(-108%); transition:transform .26s ease; z-index:206; overflow-y:auto;
        border-inline-end:1px solid var(--border); box-shadow:0 0 46px rgba(0,0,0,.35);}
    body.nav-open nav{transform:none;}
    html[dir="rtl"] nav{transform:translateX(108%);}
    .nav-scrim{position:fixed; inset:0; background:rgba(0,0,0,.45); opacity:0; pointer-events:none;
        transition:opacity .26s; z-index:205;}
    body.nav-open .nav-scrim{opacity:1; pointer-events:auto;}
    nav .nav-group{display:block;}
    header{padding-top:56px;}
    body{padding-inline-start:0;}
  }

  /* ===== accessibility layer ===== */
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;}
  .skip-link{position:absolute;top:-64px;inset-inline-start:8px;z-index:100;background:var(--accent);color:#fff;
      padding:10px 18px;border-radius:0 0 10px 10px;font-weight:700;transition:top .2s;}
  .skip-link:focus{top:0;}
  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex="0"]:focus-visible{
      outline:3px solid var(--accent2); outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *,*::before,*::after{transition:none !important; animation:none !important;}
  }
</style>
</head>
<body>
<a class="skip-link" id="skipLink" href="#main-content">Skip to main content</a>
<div class="scroll-progress" id="scrollProgress"></div>
<button type="button" class="fab nav-toggle" id="navToggle" aria-label="Open navigation menu" aria-expanded="false">☰</button>
<div class="nav-scrim" id="navScrim"></div>
<button type="button" class="fab to-top" id="toTop" aria-label="Back to top">↑</button>
<nav id="nav" aria-label="Primary"></nav>
<header id="hero"></header>
<main id="main-content"></main>
<footer id="site-footer"></footer>
<script src="assets/i18n/en.js"></script>
<script src="assets/i18n/he.js"></script>
<script src="assets/academy-core.js"></script>
</body>
</html>
